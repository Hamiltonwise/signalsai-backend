<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alloro AAE 2026 QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .qr-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 48px;
    }

    .heading {
      font-size: 42px;
      font-weight: 700;
      color: #212D40;
      text-align: center;
      letter-spacing: -0.5px;
    }

    #qr-canvas {
      width: 384px;
      height: 384px;
    }

    .subtext {
      font-size: 28px;
      font-weight: 500;
      color: #D56753;
      text-align: center;
      letter-spacing: 0.5px;
    }

    @media print {
      body {
        background: #FFFFFF;
      }

      .qr-container {
        padding: 0;
      }

      /* 4x4 inches at 96dpi = 384px */
      #qr-canvas {
        width: 4in;
        height: 4in;
      }
    }
  </style>
</head>
<body>
  <div class="qr-container">
    <div class="heading">See where you rank.</div>
    <canvas id="qr-canvas"></canvas>
    <div class="subtext">Free. 60 seconds.</div>
  </div>

  <script>
    QRCode.toCanvas(
      document.getElementById('qr-canvas'),
      'https://sandbox.getalloro.com/checkup?mode=conference&ref=aae2026',
      {
        width: 384,
        margin: 2,
        color: {
          dark: '#212D40',
          light: '#FFFFFF'
        },
        errorCorrectionLevel: 'H'
      },
      function (error) {
        if (error) console.error(error);
      }
    );
  </script>
</body>
</html>
