name: Blackboard - Main Merge Card Transition

# Scans pushes to main for Card-NN references and transitions matching cards
# in the Notion Blackboard to "Dave Shipped". Best-effort: failure here never
# blocks the deploy pipeline.

on:
  push:
    branches: [main]

jobs:
  card-shipped-transition:
    runs-on: ubuntu-latest
    # Skip if neither NOTION_TOKEN nor NOTION_API_KEY is configured
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        run: npm install

      - name: Run Dave Shipped transition for card refs in pushed commits
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        continue-on-error: true
        run: |
          # The push event payload contains commits[]. Iterate each commit's
          # message and SHA, run the transition script.
          set +e
          COMMITS=$(jq -r '.commits[].id' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "No commits in push payload -- using HEAD only"
            COMMITS="${{ github.sha }}"
          fi
          for SHA in $COMMITS; do
            MSG=$(git log -1 --format=%B "$SHA" 2>/dev/null || echo "")
            if [ -z "$MSG" ]; then continue; fi
            echo "::group::Card refs in $SHA"
            echo "$MSG" | head -5
            npx tsx scripts/blackboard-card-ref-transition.ts \
              --commit-sha="$SHA" \
              --commit-message="$MSG" \
              --to-state="Dave Shipped" \
              --actor=GitHook \
              --branch=main || true
            echo "::endgroup::"
          done
