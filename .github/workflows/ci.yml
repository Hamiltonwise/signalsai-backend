name: CI -- TypeScript + E2E

on:
  push:
    branches: [sandbox, main]
  pull_request:
    branches: [sandbox, main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript (frontend)
        working-directory: frontend
        run: npx tsc -b --force

      - name: TypeScript (backend)
        run: npx tsc --noEmit
        continue-on-error: true  # Backend tsc may OOM on small runners

  e2e:
    name: E2E Critical Journeys
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/sandbox'
    env:
      PLAYWRIGHT_BASE_URL: https://sandbox.getalloro.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run critical journey tests
        run: npx playwright test tests/e2e/critical-journeys.spec.ts --reporter=list

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

      - name: Post failure to Slack
        if: failure()
        run: |
          # Extract which test failed from Playwright output
          echo "E2E tests failed on sandbox. Check artifacts for screenshots."
          # When SLACK_WEBHOOK_URL is set, post to #alloro-dev:
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"E2E FAILURE on sandbox (commit: ${{ github.sha }}). Check GitHub Actions for screenshots and specific assertion.\"}"
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
