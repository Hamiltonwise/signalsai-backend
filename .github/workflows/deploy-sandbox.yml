name: Build and Deploy to Sandbox EC2

on:
  push:
    branches: [sandbox]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create .env file
        run: |
          echo "${{ secrets.SANDBOX_ENV_FILE }}" > .env

      - name: Create signals-google-key.json file
        run: |
          echo '${{ secrets.SANDBOX_SIGNALS_GOOGLE_KEY }}' > signals-google-key.json

      - name: Install backend dependencies
        run: npm install

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd frontend
          echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}" > .env
          rm -rf node_modules package-lock.json
          npm install
          npm run build
          cd ..

      - name: Move frontend build into backend
        run: |
          rm -rf public || true
          mkdir -p public
          cp -r frontend/dist/* public/

      - name: Prepare deploy bundle
        run: |
          mkdir -p bundle
          cp -r dist bundle/
          cp -r public bundle/
          cp -r ecosystem.config.js bundle/
          cp package*.json bundle/
          cp .env bundle/
          cp signals-google-key.json bundle/
          # knexfile.ts imports ./src/database/config which is not in the bundle,
          # and src/database/config.ts points migrations at ./src/database/migrations
          # with extension "ts" -- both paths only exist pre-compile. Generate a
          # bundle-local knexfile.js that points knex at the compiled migrations.
          cat > bundle/knexfile.js <<'EOF'
          require('dotenv').config();
          const connection = process.env.DATABASE_URL
            ? { connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } }
            : {
                host: process.env.DB_HOST,
                port: parseInt(process.env.DB_PORT || '5432', 10),
                user: process.env.DB_USER,
                password: process.env.DB_PASSWORD,
                database: process.env.DB_NAME,
                ssl: { rejectUnauthorized: false },
              };
          const base = {
            client: 'pg',
            connection,
            migrations: {
              directory: './dist/database/migrations',
              extension: 'js',
            },
            pool: { min: 2, max: 50 },
          };
          module.exports = { production: base, development: base, test: base };
          EOF

      - name: Clean remote target dir
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          port: ${{ secrets.SANDBOX_EC2_PORT }}
          key: ${{ secrets.SANDBOX_EC2_KEY }}
          script: |
            rm -rf ${{ secrets.SANDBOX_TARGET_DIR }}/*
            mkdir -p ${{ secrets.SANDBOX_TARGET_DIR }}

      - name: Upload bundle to EC2
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          port: ${{ secrets.SANDBOX_EC2_PORT }}
          key: ${{ secrets.SANDBOX_EC2_KEY }}
          source: "bundle/**"
          target: ${{ secrets.SANDBOX_TARGET_DIR }}
          strip_components: 1

      - name: Install, migrate, and reload PM2
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          port: ${{ secrets.SANDBOX_EC2_PORT }}
          key: ${{ secrets.SANDBOX_EC2_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            nvm use node
            cd ${{ secrets.SANDBOX_TARGET_DIR }}
            npm install --production
            # One-shot idempotent rename: knex_migrations rows were recorded with
            # .ts filenames when migrations ran locally via ts-node. After first
            # run, all names end in .js and the WHERE clause matches nothing.
            # Reuses the generated knexfile so the connection resolves exactly
            # as knex migrate would (supports both DATABASE_URL and DB_HOST env).
            NODE_ENV=production node -e "
              const knex = require('knex');
              const config = require('./knexfile.js').production;
              const db = knex(config);
              (async () => {
                const r = await db.raw(\"UPDATE knex_migrations SET name = REGEXP_REPLACE(name, '\\\\.ts\$', '.js') WHERE name LIKE '%.ts'\");
                console.log('[knex_migrations rename] rows affected:', r.rowCount);
                await db.destroy();
              })().catch(e => { console.error('[knex_migrations rename] FAILED:', e.message); process.exit(1); });
            "
            NODE_ENV=production npx knex migrate:latest
            sudo systemctl start redis-server || echo "Redis start warning (non-fatal)"
            sudo systemctl enable redis-server || true
            pm2 restart ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 restart minds-worker || pm2 start ecosystem.config.js --only minds-worker
            pm2 save
            echo "--- PM2 process list ---"
            pm2 list
            echo "--- signals-backend recent logs ---"
            sleep 3
            pm2 logs signals-backend --lines 40 --nostream --raw || true
